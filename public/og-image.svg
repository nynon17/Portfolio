<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Nynon Portfolio Open Graph Image</title>
  <desc id="desc">A dark gradient background with the headline Nynon Portfolio, supporting text, and a prominent View Projects call-to-action button.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070B1C" />
      <stop offset="100%" stop-color="#0F1B4A" />
    </linearGradient>
    <linearGradient id="cta" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED" />
      <stop offset="100%" stop-color="#6366F1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="1020" cy="120" r="220" fill="#4F46E5" fill-opacity="0.18" />
  <circle cx="130" cy="520" r="190" fill="#0EA5E9" fill-opacity="0.14" />

  <text x="80" y="220" fill="#FFFFFF" font-size="84" font-weight="800" font-family="Inter, Arial, sans-serif">
    Nynon Portfolio
  </text>
  <text x="80" y="290" fill="#C7D2FE" font-size="40" font-weight="600" font-family="Inter, Arial, sans-serif">
    Full-Stack Projects &amp; Creative Experiments
  </text>

  <rect x="80" y="360" width="420" height="110" rx="22" fill="url(#cta)" />
  <text x="290" y="430" text-anchor="middle" fill="#FFFFFF" font-size="46" font-weight="800" font-family="Inter, Arial, sans-serif">
    View Projects
  </text>

  <text x="80" y="560" fill="#93C5FD" font-size="32" font-weight="600" font-family="Inter, Arial, sans-serif">
    nynon.xyz · @nynon17
  </text>
</svg>
